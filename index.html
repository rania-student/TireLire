<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TireLire - Budget Étudiant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>TireLire</h1>
            <p>Gère ton budget quotidien et évite le découvert.</p>
        </header>

        <main>
            <!-- CONFIGURATION DU MOIS -->
            <section class="card setup-section">
                <h2>1. Ma situation ce mois-ci</h2>
                
                <div class="input-group">
                    <label for="income"> Mon argent au 1er du mois (Bourse, parents, job...)</label>
                    <input type="number" id="income" value="450" placeholder="Ex: 450">
                </div>

                <div class="input-group">
                    <label for="fixed-expenses"> Mes dépenses fixes totales (Loyer, forfait, abonnements...)</label>
                    <input type="number" id="fixed-expenses" value="350" placeholder="Ex: 350">
                </div>

                <div class="input-group">
                    <label for="days"> Nombre de jours dans le mois</label>
                    <input type="number" id="days" value="30" placeholder="Ex: 30">
                </div>

                <button id="btn-init" class="btn-primary">Calculer mon budget de départ</button>
            </section>

            <!-- TABLEAU DE BORD DES RÉSULTATS -->
            <section class="dashboard-section">
                <div class="card result-card">
                    <h3> Reste à vivre du mois</h3>
                    <p id="display-remaining">0.00 €</p>
                </div>
                
                <div class="card result-card highlighted">
                    <h3> Budget quotidien safe</h3>
                    <p id="display-daily-safe">0.00 € / jour</p>
                </div>
            </section>

            <!-- SUIVI DU JOUR -->
            <section class="card tracking-section">
                <h2>2. Suivi de ma journée</h2>
                
                <div class="input-group">
                    <label for="today-spent"> Aujourd'hui, j'ai dépensé :</label>
                    <div class="input-with-currency">
                        <input type="number" id="today-spent" placeholder="Ex: 8">
                    </div>
                </div>

                <button id="btn-check" class="btn-secondary">Vérifier l'impact sur mon budget</button>

                <!-- Zone d'affichage de l'alerte dynamique -->
                <div id="alert-box" class="alert-box hidden"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
